global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/recording.rules.yml
  - /etc/prometheus/rules/alerts.rules.yml

scrape_configs:
  - job_name: consenthub-saas
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets:
          - host.docker.internal:8787
