global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - recording.rules.yml
  - alerts.rules.yml

scrape_configs:
  - job_name: consenthub-saas
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets:
          - consenthub-web:8787
    # If METRICS_BEARER_TOKEN is enabled in ConsentHub, uncomment:
    # authorization:
    #   type: Bearer
    #   credentials: "replace-with-metrics-token"
